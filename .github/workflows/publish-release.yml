name: Publish umcp release from releases.yml

on:
  push:
    branches:
      - main
    paths:
      - releases.yml
      - .github/workflows/publish-release.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for tags/branches)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Read releases.yml for next release
        id: rel
        shell: bash
        run: |
          python - <<'PY'
          import os, sys, subprocess
          from pathlib import Path

          try:
            import yaml  # type: ignore
          except Exception:
            subprocess.check_call([sys.executable, "-m", "pip", "install", "--disable-pip-version-check", "pyyaml"])
            import yaml  # type: ignore

          p = Path("releases.yml")
          if not p.exists():
            print("releases.yml not found", file=sys.stderr)
            sys.exit(1)

          data = yaml.safe_load(p.read_text("utf-8"))
          entries = data["releases"] if isinstance(data, dict) and "releases" in data else data

          if not isinstance(entries, list) or not entries:
            print("releases.yml must contain a non-empty releases list", file=sys.stderr)
            sys.exit(1)

          def norm_entry(e):
            if not isinstance(e, dict):
              return None
            version = e.get("version")
            desc = e.get("description") or ""
            rname = e.get("release-name") or e.get("release_name") or ""
            tag = e.get("tag") or ""
            return {
              "version": str(version).strip() if version is not None else "",
              "description": str(desc).strip(),
              "release_name": str(rname).strip(),
              "tag": str(tag).strip(),
            }

          cleaned = [norm_entry(e) for e in entries]
          cleaned = [e for e in cleaned if e and e["version"]]
          if not cleaned:
            print("No valid entries with version found in releases.yml", file=sys.stderr)
            sys.exit(1)

          chosen = cleaned[0]
          tag = chosen["tag"] or f"v{chosen['version']}"

          def tag_exists(tagname: str) -> bool:
            r1 = subprocess.run(
              ["git", "rev-parse", "-q", "--verify", f"refs/tags/{tagname}"],
              stdout=subprocess.DEVNULL,
              stderr=subprocess.DEVNULL,
            )
            if r1.returncode == 0:
              return True
            r2 = subprocess.run(
              ["git", "ls-remote", "--tags", "origin", tagname],
              capture_output=True,
              text=True,
            )
            return bool(r2.stdout.strip())

          out = os.environ["GITHUB_OUTPUT"]

          if tag_exists(tag):
            with open(out, "a", encoding="utf-8") as f:
              f.write("should_publish=false\n")
              f.write(f"tag={tag}\n")
              f.write(f"version={chosen['version']}\n")
              f.write(f"release_name={chosen['release_name']}\n")
              f.write("description<<EOF\n" + chosen["description"] + "\nEOF\n")
            print(f"Tag {tag} already exists. Nothing to do.")
            sys.exit(0)

          with open(out, "a", encoding="utf-8") as f:
            f.write("should_publish=true\n")
            f.write(f"tag={tag}\n")
            f.write(f"version={chosen['version']}\n")
            f.write(f"release_name={chosen['release_name']}\n")
            f.write("description<<EOF\n" + chosen["description"] + "\nEOF\n")

          print(f"Will publish {tag}")
          PY

      - name: Stop early if already published
        if: steps.rel.outputs.should_publish != 'true'
        run: echo "No new release to publish."

      - name: Install deps
        if: steps.rel.outputs.should_publish == 'true'
        run: npm ci

      - name: Build package
        if: steps.rel.outputs.should_publish == 'true'
        shell: bash
        run: |
          npm run make
          test -f package.json
          test -d out
          test -f out/package.json

      - name: Stage package
        if: steps.rel.outputs.should_publish == 'true'
        shell: bash
        run: |
          cat > out/RELEASE.txt <<EOF
          tag: ${{ steps.rel.outputs.tag }}
          source_sha: ${{ github.sha }}
          built_at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

          ls -la out

      - name: Zip package
        if: steps.rel.outputs.should_publish == 'true'
        shell: bash
        run: |
          TAG="${{ steps.rel.outputs.tag }}"
          mkdir -p _release_artifacts
          (
            cd out
            zip -r "../_release_artifacts/umcp-${TAG}.zip" .
          )
          ls -la _release_artifacts

      - name: Prepare git identity
        if: steps.rel.outputs.should_publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or update releases branch with package root
        if: steps.rel.outputs.should_publish == 'true'
        shell: bash
        run: |
          TAG="${{ steps.rel.outputs.tag }}"

          rm -rf _wt_releases

          if git ls-remote --exit-code --heads origin releases >/dev/null 2>&1; then
            git fetch origin releases:releases
            git worktree add _wt_releases releases
          else
            git worktree add --orphan -b releases _wt_releases
            pushd _wt_releases >/dev/null
            git rm -rf . >/dev/null 2>&1 || true
            echo "# releases branch (built artifacts only)" > README.md
            git add README.md
            git commit -m "chore: initialize releases branch"
            popd >/dev/null
          fi

          find _wt_releases -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +

          cp -R out/. _wt_releases/

          pushd _wt_releases >/dev/null
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit on releases branch."
          else
            git commit -m "release: ${TAG}"
          fi

          git push origin releases

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            git tag -d "${TAG}"
          fi
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

          popd >/dev/null

      - name: Create GitHub Release
        if: steps.rel.outputs.should_publish == 'true' && steps.rel.outputs.release_name != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.rel.outputs.tag }}"
          TITLE="${{ steps.rel.outputs.release_name }}"
          REPO="${{ github.repository }}"
          CDN_BASE="https://cdn.jsdelivr.net/gh/${REPO}@${TAG}/"

          cat > _release_notes.md <<'__NOTES__'
          ${{ steps.rel.outputs.description }}

          __NOTES__

          cat >> _release_notes.md <<EOF

          ## CDN
          The release is available on jsDelivr from the package root, for example:
          \`\`\`
          ${CDN_BASE}mcp-sdk-client.js
          ${CDN_BASE}mcp-sdk-server.js
          ${CDN_BASE}mcp-sdk-shared.js
          ${CDN_BASE}mcp-sdk-types.js
          ${CDN_BASE}mcp-zod-compat.js
          ${CDN_BASE}ajv.js
          ${CDN_BASE}ajv-formats.js
          \`\`\`
          EOF

          gh release create "${TAG}" \
            --title "${TITLE}" \
            --notes-file _release_notes.md \
            --target "releases" \
            --verify-tag \
            "_release_artifacts/umcp-${TAG}.zip"
